port: 7890
socks-port: 7891
mixed-port: 7893
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
tcp-concurrent: true
unified-delay: true

# ==================== 設定檔快取 ====================
profile:
  store-selected: true
  store-fake-ip: true

# ==================== 流量嗅探器 Sniffer ====================
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
  parse-pure-ip: true
  force-dns-mapping: true

# ==================== 進階 DNS 設定 (中港兩地智能切換版) ====================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true  # 開啟：讓兜底的 DoH 解析也能精準走分流規則，在大陸完美防污染
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '*.home.arpa'
    - 'captive.apple.com'
    - 'time.apple.com'
    - 'time.*.apple.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'ntp.*.com'
    # 讓國內網站與蘋果服務強制返回真實 IP
    - 'rule-set:meta-cn,meta-private,meta-apple' 
  
  # 基礎 DNS (解析 DoH 網域用，混合中外 DNS 確保兩地皆通)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 1.1.1.1

  # 節點專用 DNS (只用來找機場的 IP，防止在大陸找不到海外機場，或在香港被擋)
  proxy-server-nameserver:
    - 223.5.5.5
    - 8.8.8.8

  nameserver-policy:
    # 國內網站強制使用國內公共 DNS (阿里、騰訊)
    "rule-set:meta-cn":
      - 223.5.5.5
      - 119.29.29.29
    # 蘋果服務：中外 DNS 並發競爭！香港 8.8.8.8 回應快得 HK CDN；大陸 223.5.5.5 回應快得 CN CDN
    "rule-set:meta-apple":
      - 223.5.5.5
      - 8.8.8.8

  # 國外網站兜底 DNS (使用加密 DoH。在大陸會自動走代理防污染，香港直連極速)
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

# ==================================================
# 代理節點設定
# ==================================================
proxies:

proxy-groups:
  - name: 🚀 節點選擇
    type: select
    proxies:
      - ⚡ 自動選擇
      - DIRECT

  - name: ⚡ 自動選擇
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:

  - name: 💬 AI 服務
    type: select
    proxies:
      - ⚡ 自動選擇
      - 🚀 節點選擇

  - name: 🍎 蘋果服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: Ⓜ️ 微軟服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🎮 遊戲平台
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🌐 非中國
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🇨🇳 國內服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🏠 私有網絡
    type: select
    proxies:
      - DIRECT

  - name: 🐟 漏網之魚
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🛑 廣告攔截
    type: select
    proxies:
      - REJECT
      - DIRECT

